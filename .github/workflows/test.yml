name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - 'claude/**'

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Pin to Xcode 26 / iOS 26 SDK — required for the iPhone 17 simulator the
      # rest of the project's tooling assumes (Xcode 16.x has no such device).
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Install xcbeautify (best effort)
        run: brew install xcbeautify || true

      - name: Resolve simulator
        run: |
          set -euo pipefail
          # Prefer an exact "iPhone 17" match; fall back to the first available
          # iPhone simulator since exact device availability can vary by image.
          DEST_UDID=$(xcrun simctl list devices available --json | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          devices = [d for runtime in data["devices"].values() for d in runtime]
          exact = [d for d in devices if d.get("name") == "iPhone 17"]
          if exact:
              print(exact[0]["udid"])
          else:
              import re
              iphones = [d for d in devices if re.match(r"^iPhone", d.get("name", ""))]
              print(iphones[0]["udid"] if iphones else "")
          ')
          if [ -z "$DEST_UDID" ]; then
            echo "::error::No available iPhone simulator found on this runner image."
            exit 1
          fi
          echo "DEST_UDID=$DEST_UDID" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          set -o pipefail
          if command -v xcbeautify >/dev/null 2>&1; then
            xcodebuild test -project EggSpend.xcodeproj -scheme EggSpend \
              -destination "platform=iOS Simulator,id=$DEST_UDID" \
              -resultBundlePath TestResults.xcresult | xcbeautify
          else
            xcodebuild test -project EggSpend.xcodeproj -scheme EggSpend \
              -destination "platform=iOS Simulator,id=$DEST_UDID" \
              -resultBundlePath TestResults.xcresult
          fi

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
